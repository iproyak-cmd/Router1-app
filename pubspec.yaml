name: fabula_app
description: Fabula — личный проводник по чувствам и знакам.
publish_to: "none"
version: 0.5.9+29

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  crypto: ^3.0.7
  shared_preferences: ^2.5.3
  url_launcher: ^6.3.2
  path_provider: ^2.1.6
  share_plus: ^13.2.0
  file_saver: ^0.2.14
  flutter_secure_storage: ^10.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/fabula/
    - assets/fabula/daily_looks/
    - assets/fabula/tarot/
