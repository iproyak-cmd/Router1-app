name: Patch Fabula daily look card

on:
  push:
    branches:
      - agent/fabula-daily-look-editorial
    paths:
      - ".github/workflows/fabula-daily-look-patch.yml"

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fabula-daily-look-editorial
          fetch-depth: 0

      - name: Replace daily look card layout
        shell: python
        run: |
          from pathlib import Path

          path = Path("lib/main.dart")
          text = path.read_text(encoding="utf-8")
          old = '''class _DailyLookCard extends StatelessWidget {
            const _DailyLookCard({required this.look});

            final DailyLook look;

            @override
            Widget build(BuildContext context) => ClipRRect(
              borderRadius: BorderRadius.circular(26),
              child: AspectRatio(
                aspectRatio: 1.38,
                child: Stack(
                  fit: StackFit.expand,
                  children: [
                    _DailyLookImage(look: look),
                    const DecoratedBox(
                      decoration: BoxDecoration(
                        gradient: LinearGradient(
                          begin: Alignment.centerLeft,
                          end: Alignment.centerRight,
                          colors: [
                            Color(0xD9F6F2ED),
                            Color(0x66F6F2ED),
                            Color(0x00000000),
                          ],
                          stops: [0, .5, .82],
                        ),
                      ),
                    ),
                    Padding(
                      padding: const EdgeInsets.all(22),
                      child: Align(
                        alignment: Alignment.centerLeft,
                        child: SizedBox(
                          width: 155,
                          child: Column(
                            mainAxisSize: MainAxisSize.min,
                            crossAxisAlignment: CrossAxisAlignment.start,
                            children: [
                              const _SectionLabel('ОБРАЗ ДНЯ'),
                              const SizedBox(height: 8),
                              _editorial(look.title, size: 24),
                              const SizedBox(height: 8),
                              Text(
                                look.description,
                                style: const TextStyle(
                                  color: _muted,
                                  fontSize: 12,
                                  height: 1.35,
                                ),
                              ),
                            ],
                          ),
                        ),
                      ),
                    ),
                  ],
                ),
              ),
            );
          }
'''
          new = '''class _DailyLookCard extends StatelessWidget {
            const _DailyLookCard({required this.look});

            final DailyLook look;

            @override
            Widget build(BuildContext context) => Container(
              decoration: BoxDecoration(
                color: Colors.white,
                borderRadius: BorderRadius.circular(26),
                border: Border.all(color: _line),
                boxShadow: const [
                  BoxShadow(
                    color: Color(0x0D000000),
                    blurRadius: 18,
                    offset: Offset(0, 6),
                  ),
                ],
              ),
              clipBehavior: Clip.antiAlias,
              child: Column(
                crossAxisAlignment: CrossAxisAlignment.start,
                children: [
                  AspectRatio(
                    aspectRatio: 4 / 5,
                    child: ColoredBox(
                      color: const Color(0xFFE8E0D9),
                      child: _DailyLookImage(look: look),
                    ),
                  ),
                  Padding(
                    padding: const EdgeInsets.fromLTRB(22, 20, 22, 24),
                    child: Column(
                      crossAxisAlignment: CrossAxisAlignment.start,
                      children: [
                        const _SectionLabel('ОБРАЗ ДНЯ'),
                        const SizedBox(height: 9),
                        _editorial(look.title, size: 27),
                        const SizedBox(height: 12),
                        Text(
                          look.description,
                          style: const TextStyle(
                            color: _muted,
                            fontSize: 14,
                            height: 1.55,
                          ),
                        ),
                      ],
                    ),
                  ),
                ],
              ),
            );
          }
'''
          if old not in text:
              raise SystemExit("Expected daily look card block was not found")
          text = text.replace(old, new, 1)
          text = text.replace(
              "fit: BoxFit.cover,\n        alignment: const Alignment(.5, -.2),",
              "fit: BoxFit.contain,",
          )
          path.write_text(text, encoding="utf-8")

      - name: Validate patch
        run: |
          grep -q "aspectRatio: 4 / 5" lib/main.dart
          ! grep -q "Color(0xD9F6F2ED)" lib/main.dart
          git diff --check

      - name: Commit patched card
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lib/main.dart
          git commit -m "Show full daily look without overlay"
          git push origin HEAD:agent/fabula-daily-look-editorial
