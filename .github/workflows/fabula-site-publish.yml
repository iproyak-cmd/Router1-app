name: Publish Fabula site

on:
  workflow_dispatch:
  push:
    branches: [fabula]
    paths:
      - ".github/workflows/fabula-site-publish.yml"
      - "site/fabula/**"

permissions:
  contents: read

concurrency:
  group: fabula-site-production
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    env:
      SSHPASS: ${{ secrets.MSK_SSH_PASSWORD }}
    steps:
      - name: Checkout Fabula site
        uses: actions/checkout@v4
        with:
          path: source

      - name: Checkout Android release
        uses: actions/checkout@v4
        with:
          ref: fabula-android-builds
          path: android-release

      - name: Checkout Windows release
        uses: actions/checkout@v4
        with:
          ref: fabula-builds
          path: windows-release

      - name: Prepare verified production bundle
        shell: bash
        run: |
          set -euo pipefail
          test -n "${SSHPASS:-}"
          test -s source/site/fabula/index.html
          test -s source/site/fabula/content/daily-looks.json
          test -s source/assets/fabula/tarot/hanged_man.webp
          test -s android-release/Fabula.apk
          test -s windows-release/FabulaSetup.exe

          stage="${RUNNER_TEMP}/fabula-site"
          install -d "$stage/assets" "$stage/android" "$stage/windows" "$stage/content/daily_looks"
          install -m 0644 source/site/fabula/index.html "$stage/index.html"
          install -m 0644 source/assets/fabula/tarot/hanged_man.webp "$stage/assets/hanged_man.webp"
          install -m 0644 source/site/fabula/content/daily-looks.json "$stage/content/daily-looks.json"
          install -m 0644 source/assets/fabula/daily_looks/*.webp "$stage/content/daily_looks/"
          install -m 0644 android-release/Fabula.apk "$stage/android/Fabula.apk"
          install -m 0644 windows-release/FabulaSetup.exe "$stage/windows/FabulaSetup.exe"

          android_sha=$(sha256sum "$stage/android/Fabula.apk" | awk '{print $1}')
          android_size=$(stat -c '%s' "$stage/android/Fabula.apk")
          windows_sha=$(sha256sum "$stage/windows/FabulaSetup.exe" | awk '{print $1}')
          windows_size=$(stat -c '%s' "$stage/windows/FabulaSetup.exe")

          cat > "$stage/android/version.json" <<JSON
          {
            "version": "0.4.3",
            "build": 13,
            "min_supported_build": 11,
            "url": "https://router1.tech/fabula/android/Fabula.apk",
            "sha256": "$android_sha",
            "size": $android_size,
            "notes": "Образ дня без повторов: личная история показов, свежие editorial-партии и автоматический редакционный резерв."
          }
          JSON

          cat > "$stage/windows/version.json" <<JSON
          {
            "version": "0.4.3",
            "build": 13,
            "min_supported_build": 11,
            "url": "https://router1.tech/fabula/windows/FabulaSetup.exe",
            "sha256": "$windows_sha",
            "size": $windows_size,
            "notes": "Образ дня без повторов: личная история показов, свежие editorial-партии и автоматический редакционный резерв."
          }
          JSON

          printf '%s  %s\n' "$android_sha" "android/Fabula.apk" > "$stage/SHA256SUMS"
          printf '%s  %s\n' "$windows_sha" "windows/FabulaSetup.exe" >> "$stage/SHA256SUMS"

      - name: Upload and publish with rollback copy
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y -qq sshpass
          remote="/tmp/fabula-site-${GITHUB_RUN_ID}"
          SSHPASS="$SSHPASS" sshpass -e scp -r \
            -o StrictHostKeyChecking=accept-new \
            "${RUNNER_TEMP}/fabula-site" \
            "root@201.51.4.89:${remote}"

          SSHPASS="$SSHPASS" sshpass -e ssh \
            -o StrictHostKeyChecking=accept-new \
            root@201.51.4.89 "REMOTE_STAGE='${remote}' bash -s" <<'REMOTE'
          set -euo pipefail
          test -s "$REMOTE_STAGE/index.html"
          test -s "$REMOTE_STAGE/android/Fabula.apk"
          test -s "$REMOTE_STAGE/windows/FabulaSetup.exe"

          stamp=$(date -u +%Y%m%dT%H%M%SZ)
          backup="/var/backups/fabula-site/$stamp"
          install -d -m 0755 "$backup"

          publish_root() {
            root="$1"
            install -d -m 0755 "$root/assets" "$root/android" "$root/windows" "$root/content/daily_looks"
            for item in index.html assets/hanged_man.webp content/daily-looks.json android/Fabula.apk android/version.json windows/FabulaSetup.exe windows/version.json SHA256SUMS; do
              if [ -f "$root/$item" ]; then
                install -d -m 0755 "$backup/$(dirname "$item")"
                cp -a "$root/$item" "$backup/$item"
              fi
              install -d -m 0755 "$root/$(dirname "$item")"
              install -m 0644 "$REMOTE_STAGE/$item" "$root/$item.new"
              mv -f "$root/$item.new" "$root/$item"
            done
            for source in "$REMOTE_STAGE"/content/daily_looks/*.webp; do
              item="content/daily_looks/$(basename "$source")"
              if [ -f "$root/$item" ]; then
                install -d -m 0755 "$backup/$(dirname "$item")"
                cp -a "$root/$item" "$backup/$item"
              fi
              install -m 0644 "$source" "$root/$item.new"
              mv -f "$root/$item.new" "$root/$item"
            done
          }

          publish_root /var/www/html/fabula
          publish_root /var/www/fabula
          rm -rf "$REMOTE_STAGE"

          curl -fsS http://127.0.0.1/fabula/ >/dev/null
          curl -fsS http://127.0.0.1/fabula/android/version.json >/dev/null
          echo "FABULA_SITE_PUBLISH_OK backup=$backup"
          REMOTE

      - name: Verify public page and downloads
        shell: bash
        run: |
          set -euo pipefail
          page=$(curl -fsS --retry 5 --retry-delay 2 https://router1.tech/fabula/)
          grep -Fq 'Собрать свою Fabula' <<<"$page"
          grep -Fq 'Fabula заботится' <<<"$page"
          grep -Fq '10 эмоциональных модулей' <<<"$page"
          grep -Fq 'Музыка настроения' <<<"$page"
          grep -Fq 'AI-собеседник Fabula' <<<"$page"
          curl -fsS --retry 5 --retry-delay 2 https://router1.tech/fabula/content/daily-looks.json | jq -e '.looks | length >= 8' >/dev/null
          curl -fsSI --retry 5 --retry-delay 2 https://router1.tech/fabula/android/Fabula.apk | grep -Fq '200'
          curl -fsSI --retry 5 --retry-delay 2 https://router1.tech/fabula/windows/FabulaSetup.exe | grep -Fq '200'
          curl -fsS --retry 5 --retry-delay 2 https://router1.tech/fabula/android/version.json | grep -Fq '"build": 13'
