name: Router1 Windows

permissions:
  contents: write

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/windows-build.yml"
      - "lib/**"
      - "windows/**"
      - "assets/**"
      - "third_party/**"
      - "tool/prepare_windows_engine.ps1"
      - "pubspec.yaml"
      - "pubspec.lock"

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - id: pubget
        continue-on-error: true
        run: flutter pub get
      - id: analyze
        continue-on-error: true
        run: flutter analyze
      - id: test
        continue-on-error: true
        run: flutter test
      - id: windows
        continue-on-error: true
        run: flutter build windows --release
      - name: Add embedded Router1 network engine
        id: engine
        continue-on-error: true
        shell: powershell
        run: .\tool\prepare_windows_engine.ps1
      - name: Build Router1 installer
        id: installer
        continue-on-error: true
        shell: powershell
        run: |
          choco install innosetup --no-progress -y
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" ".\windows\installer\router1.iss"
      - uses: actions/upload-artifact@v4
        if: steps.installer.outcome == 'success'
        with:
          name: Router1-Windows
          path: build-output/windows/Router1Setup.exe
          if-no-files-found: error
      - name: Publish latest installer for Router1 delivery
        if: always()
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path "$env:RUNNER_TEMP\router1-release" | Out-Null
          $Installer = ".\build-output\windows\Router1Setup.exe"
          if (Test-Path $Installer) {
            Copy-Item $Installer "$env:RUNNER_TEMP\router1-release\Router1Setup.exe"
          }
          @"
          pubget=${{ steps.pubget.outcome }}
          analyze=${{ steps.analyze.outcome }}
          test=${{ steps.test.outcome }}
          windows=${{ steps.windows.outcome }}
          engine=${{ steps.engine.outcome }}
          installer=${{ steps.installer.outcome }}
          run=https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          "@ | Set-Content -Encoding UTF8 "$env:RUNNER_TEMP\router1-release\build-report.txt"
          git config user.name "router1-build"
          git config user.email "build@router1.tech"
          git fetch origin builds 2>$null
          if ($LASTEXITCODE -eq 0) {
            git switch builds
            git rm -rf .
          } else {
            git switch --orphan builds
            git rm -rf . 2>$null
          }
          New-Item -ItemType Directory -Force -Path "dist" | Out-Null
          Copy-Item "$env:RUNNER_TEMP\router1-release\*" ".\dist\"
          if (Test-Path ".\dist\Router1Setup.exe") {
            Get-FileHash -Algorithm SHA256 ".\dist\Router1Setup.exe" | ForEach-Object { $_.Hash.ToLowerInvariant() + "  Router1Setup.exe" } | Set-Content -Encoding ASCII ".\dist\Router1Setup.exe.sha256"
          }
          git add dist
          git commit -m "build: publish Router1 Windows installer"
          git push origin builds --force
