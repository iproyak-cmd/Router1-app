name: Router1 Windows

permissions:
  contents: write

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/windows-build.yml"
      - "lib/**"
      - "windows/**"
      - "assets/**"
      - "third_party/**"
      - "tool/prepare_windows_engine.ps1"
      - "pubspec.yaml"
      - "pubspec.lock"

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - id: pubget
        continue-on-error: true
        run: flutter pub get
      - id: analyze
        continue-on-error: true
        run: flutter analyze
      - id: test
        continue-on-error: true
        run: flutter test
      - id: windows
        continue-on-error: true
        shell: powershell
        run: |
          cmd.exe /d /s /c "flutter build windows --release > windows-build.log 2>&1"
          $BuildExitCode = $LASTEXITCODE
          Get-Content -Path windows-build.log
          if ($BuildExitCode -ne 0) { exit $BuildExitCode }
      - name: Add embedded Router1 network engine
        id: engine
        continue-on-error: true
        shell: powershell
        run: .\tool\prepare_windows_engine.ps1
      - name: Build Router1 installer
        id: installer
        continue-on-error: true
        shell: powershell
        run: |
          choco install innosetup --no-progress -y
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" ".\windows\installer\router1.iss"
      - uses: actions/upload-artifact@v4
        if: steps.installer.outcome == 'success'
        with:
          name: Router1-Windows
          path: build-output/windows/Router1Setup.exe
          if-no-files-found: error
      - name: Prepare latest installer for Router1 delivery
        if: always()
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path "$env:RUNNER_TEMP\router1-release" | Out-Null
          $Installer = ".\build-output\windows\Router1Setup.exe"
          if (Test-Path $Installer) {
            Copy-Item $Installer "$env:RUNNER_TEMP\router1-release\Router1Setup.exe"
          }
          if (Test-Path ".\windows-build.log") {
            Copy-Item ".\windows-build.log" "$env:RUNNER_TEMP\router1-release\windows-build.log"
          }
          @"
          pubget=${{ steps.pubget.outcome }}
          analyze=${{ steps.analyze.outcome }}
          test=${{ steps.test.outcome }}
          windows=${{ steps.windows.outcome }}
          engine=${{ steps.engine.outcome }}
          installer=${{ steps.installer.outcome }}
          run=https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          "@ | Set-Content -Encoding UTF8 "$env:RUNNER_TEMP\router1-release\build-report.txt"
          if (Test-Path "$env:RUNNER_TEMP\router1-release\Router1Setup.exe") {
            Get-FileHash -Algorithm SHA256 "$env:RUNNER_TEMP\router1-release\Router1Setup.exe" | ForEach-Object { $_.Hash.ToLowerInvariant() + "  Router1Setup.exe" } | Set-Content -Encoding ASCII "$env:RUNNER_TEMP\router1-release\Router1Setup.exe.sha256"
          }
      - name: Publish latest installer for Router1 delivery
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: builds
          publish_dir: ${{ runner.temp }}/router1-release
          force_orphan: true
