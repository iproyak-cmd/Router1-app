name: Fabula Windows

permissions:
  contents: write

on:
  workflow_dispatch:
  push:
    branches: [fabula]
    paths:
      - ".github/workflows/windows-build.yml"
      - "lib/**"
      - "test/**"
      - "windows/**"
      - "assets/**"
      - "third_party/**"
      - "tool/prepare_windows_engine.ps1"
      - "pubspec.yaml"
      - "pubspec.lock"

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - id: pubget
        continue-on-error: true
        run: flutter pub get
      - id: analyze
        continue-on-error: true
        run: flutter analyze
      - id: test
        continue-on-error: true
        run: flutter test
      - id: windows
        continue-on-error: true
        shell: powershell
        env:
          ROUTER1_APP_TOKEN: ${{ secrets.ROUTER1_APP_TOKEN || secrets.APP_API_TOKEN }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:ROUTER1_APP_TOKEN)) {
            "ROUTER1_APP_TOKEN or APP_API_TOKEN repository secret is required" | Set-Content -Encoding UTF8 windows-build.log
            throw "ROUTER1_APP_TOKEN repository secret is required"
          }
          cmd.exe /d /s /c "flutter build windows --release --dart-define=ROUTER1_APP_TOKEN=$env:ROUTER1_APP_TOKEN > windows-build.log 2>&1"
          $BuildExitCode = $LASTEXITCODE
          Get-Content -Path windows-build.log
          if ($BuildExitCode -ne 0) { exit $BuildExitCode }
      - name: Add embedded Router1 network engine
        id: engine
        continue-on-error: true
        shell: powershell
        run: .\tool\prepare_windows_engine.ps1
      - name: Build Fabula installer
        id: installer
        continue-on-error: true
        shell: powershell
        run: |
          choco install innosetup --no-progress -y
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" ".\windows\installer\router1.iss"
      - uses: actions/upload-artifact@v4
        if: steps.installer.outcome == 'success'
        with:
          name: Fabula-Windows
          path: build-output/windows/FabulaSetup.exe
          if-no-files-found: error
      - name: Require a complete installer
        shell: powershell
        run: |
          if (-not (Test-Path ".\\build-output\\windows\\FabulaSetup.exe")) {
            throw "FabulaSetup.exe was not created"
          }
      - name: Prepare latest installer for Router1 delivery
        if: always()
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path "$env:RUNNER_TEMP\fabula-release" | Out-Null
          $Installer = ".\build-output\windows\FabulaSetup.exe"
          if (Test-Path $Installer) {
            Copy-Item $Installer "$env:RUNNER_TEMP\fabula-release\FabulaSetup.exe"
          }
          if (Test-Path ".\windows-build.log") {
            Copy-Item ".\windows-build.log" "$env:RUNNER_TEMP\fabula-release\windows-build.log"
          }
          @"
          pubget=${{ steps.pubget.outcome }}
          analyze=${{ steps.analyze.outcome }}
          test=${{ steps.test.outcome }}
          windows=${{ steps.windows.outcome }}
          engine=${{ steps.engine.outcome }}
          installer=${{ steps.installer.outcome }}
          run=https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          "@ | Set-Content -Encoding UTF8 "$env:RUNNER_TEMP\fabula-release\build-report.txt"
          if (Test-Path "$env:RUNNER_TEMP\fabula-release\FabulaSetup.exe") {
            Get-FileHash -Algorithm SHA256 "$env:RUNNER_TEMP\fabula-release\FabulaSetup.exe" | ForEach-Object { $_.Hash.ToLowerInvariant() + "  FabulaSetup.exe" } | Set-Content -Encoding ASCII "$env:RUNNER_TEMP\fabula-release\FabulaSetup.exe.sha256"
          }
      - name: Publish latest installer for Router1 delivery
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: fabula-builds
          publish_dir: ${{ runner.temp }}/fabula-release
          force_orphan: true

  publish:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SSHPASS: ${{ secrets.MSK_SSH_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: Fabula-Windows
          path: release
      - name: Publish installer and version manifest
        shell: bash
        run: |
          set -euo pipefail
          test -n "$SSHPASS"
          test -s release/FabulaSetup.exe
          version=$(sed -n 's/^version: \([0-9][^+]*\)+\([0-9][0-9]*\)$/\1/p' pubspec.yaml)
          build=$(sed -n 's/^version: \([0-9][^+]*\)+\([0-9][0-9]*\)$/\2/p' pubspec.yaml)
          test -n "$version"
          test -n "$build"
          sha=$(sha256sum release/FabulaSetup.exe | awk '{print $1}')
          size=$(stat -c '%s' release/FabulaSetup.exe)
          jq -n \
            --arg version "$version" --argjson build "$build" \
            --arg url 'https://router1.tech/fabula/windows/FabulaSetup.exe' \
            --arg sha256 "$sha" --argjson size "$size" \
            '{version:$version,build:$build,min_supported_build:11,url:$url,sha256:$sha256,size:$size,notes:"Чат Fabula: ответы, копирование, вставка и отправка по Enter."}' \
            > release/version.json
          sudo apt-get update -qq
          sudo apt-get install -y -qq sshpass
          SSHPASS="$SSHPASS" sshpass -e scp \
            -o StrictHostKeyChecking=accept-new \
            release/FabulaSetup.exe release/version.json \
            root@201.51.4.89:/tmp/
          SSHPASS="$SSHPASS" sshpass -e ssh \
            -o StrictHostKeyChecking=accept-new \
            root@201.51.4.89 'bash -s' <<'REMOTE'
          set -euo pipefail
          for root in /var/www/html/fabula /var/www/fabula; do
            install -d -m 0755 "$root/windows"
            install -m 0644 /tmp/FabulaSetup.exe "$root/windows/FabulaSetup.exe.new"
            install -m 0644 /tmp/version.json "$root/windows/version.json.new"
            mv -f "$root/windows/FabulaSetup.exe.new" "$root/windows/FabulaSetup.exe"
            mv -f "$root/windows/version.json.new" "$root/windows/version.json"
          done
          rm -f /tmp/FabulaSetup.exe /tmp/version.json
          REMOTE
      - name: Verify public Windows release
        shell: bash
        run: |
          set -euo pipefail
          expected=$(sed -n 's/^version: \([0-9][^+]*\)+.*$/\1/p' pubspec.yaml)
          actual=$(curl -fsS --retry 5 --retry-delay 2 https://router1.tech/fabula/windows/version.json | jq -r .version)
          test "$actual" = "$expected"
          curl -fsSI --retry 5 --retry-delay 2 https://router1.tech/fabula/windows/FabulaSetup.exe | grep -Fq '200'
