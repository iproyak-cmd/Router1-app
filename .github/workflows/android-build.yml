name: Fabula Android

concurrency:
  group: fabula-android-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

on:
  workflow_dispatch:
  push:
    branches: [fabula]
    paths:
      - ".github/workflows/android-build.yml"
      - "lib/**"
      - "test/**"
      - "android/**"
      - "assets/**"
      - "pubspec.yaml"
      - "pubspec.lock"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Cache Android and native build dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: fabula-android-${{ runner.os }}-${{ hashFiles('pubspec.lock', 'android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties', 'android/tunnel/**') }}
          restore-keys: |
            fabula-android-${{ runner.os }}-
      - run: flutter pub get
      - run: flutter analyze --no-fatal-infos
      - run: flutter test
      - name: Build Android APK
        env:
          ROUTER1_APP_TOKEN: ${{ secrets.ROUTER1_APP_TOKEN || secrets.APP_API_TOKEN }}
        run: |
          test -n "$ROUTER1_APP_TOKEN"
          flutter build apk --release --target-platform android-arm64 --dart-define=ROUTER1_APP_TOKEN="$ROUTER1_APP_TOKEN"
      - name: Prepare Android release
        run: |
          mkdir -p "${RUNNER_TEMP}/fabula-android"
          cp build/app/outputs/flutter-apk/app-release.apk "${RUNNER_TEMP}/fabula-android/Fabula.apk"
          sha256sum "${RUNNER_TEMP}/fabula-android/Fabula.apk" > "${RUNNER_TEMP}/fabula-android/Fabula.apk.sha256"
      - name: Publish Android release
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: fabula-android-builds
          publish_dir: ${{ runner.temp }}/fabula-android
          force_orphan: true
