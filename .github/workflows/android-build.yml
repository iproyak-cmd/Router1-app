name: Fabula Android

concurrency:
  group: fabula-android-v4-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

on:
  workflow_dispatch:
  pull_request:
    branches: [fabula]
    paths:
      - ".github/workflows/android-build.yml"
      - "lib/**"
      - "tool/**"
      - "test/**"
      - "android/**"
      - "assets/**"
      - "pubspec.yaml"
      - "pubspec.lock"
  push:
    branches: [fabula]
    paths:
      - ".github/workflows/android-build.yml"
      - "lib/**"
      - "tool/**"
      - "test/**"
      - "android/**"
      - "assets/**"
      - "pubspec.yaml"
      - "pubspec.lock"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Apply Fabula VPN preparation hotfix
        run: python3 tool/apply_fabula_vpn_prepare_hotfix.py
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Cache Android and native build dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: fabula-android-${{ runner.os }}-${{ hashFiles('pubspec.lock', 'android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties', 'android/libs/tunnel-release.aar') }}
          restore-keys: |
            fabula-android-${{ runner.os }}-
      - run: flutter pub get
      - name: Synchronize in-app version constants
        shell: bash
        run: |
          set -Eeuo pipefail
          FULL_VERSION=$(awk '/^version:/ {print $2; exit}' pubspec.yaml)
          VERSION=${FULL_VERSION%%+*}
          BUILD=${FULL_VERSION##*+}
          python3 - "$VERSION" "$BUILD" <<'PY'
          from pathlib import Path
          import re
          import sys

          version, build = sys.argv[1], sys.argv[2]
          path = Path('lib/main.dart')
          text = path.read_text()
          text, version_count = re.subn(
              r"const fabulaVersion = '[^']+';",
              f"const fabulaVersion = '{version}+{build}';",
              text,
              count=1,
          )
          text, build_count = re.subn(
              r"const fabulaBuild = \d+;",
              f"const fabulaBuild = {build};",
              text,
              count=1,
          )
          if version_count != 1 or build_count != 1:
              raise SystemExit('Failed to synchronize Fabula version constants')
          path.write_text(text)
          print(f'VERSION_SYNC_OK version={version} build={build}')
          PY
      - run: flutter test
      - name: Prepare persistent Fabula release signing
        if: github.event_name != 'pull_request'
        env:
          SSHPASS: ${{ secrets.MSK_SSH_PASSWORD }}
          FABULA_SIGNING_PASSWORD: ${{ secrets.ROUTER1_APP_TOKEN || secrets.APP_API_TOKEN }}
        run: |
          set -Eeuo pipefail
          test -n "$SSHPASS"
          test -n "$FABULA_SIGNING_PASSWORD"
          sudo apt-get update -qq
          sudo apt-get install -y -qq sshpass

          SIGNING_DIR="${RUNNER_TEMP}/fabula-signing"
          LOCAL_KEYSTORE="${SIGNING_DIR}/fabula-release.p12"
          REMOTE_KEYSTORE="/opt/vpn_bot/secrets/fabula-release.p12"
          mkdir -p "$SIGNING_DIR"

          if ! sshpass -e scp \
            -o StrictHostKeyChecking=accept-new \
            -o ConnectTimeout=15 \
            "root@201.51.4.89:${REMOTE_KEYSTORE}" \
            "$LOCAL_KEYSTORE"; then
            keytool -genkeypair -noprompt \
              -storetype PKCS12 \
              -keystore "$LOCAL_KEYSTORE" \
              -storepass "$FABULA_SIGNING_PASSWORD" \
              -keypass "$FABULA_SIGNING_PASSWORD" \
              -alias fabula \
              -keyalg RSA \
              -keysize 4096 \
              -validity 10000 \
              -dname "CN=Fabula, OU=Mobile, O=Router1, L=Saint Petersburg, C=RU"

            sshpass -e ssh \
              -o StrictHostKeyChecking=accept-new \
              -o ConnectTimeout=15 \
              root@201.51.4.89 \
              'install -d -m 0700 /opt/vpn_bot/secrets'
            sshpass -e scp \
              -o StrictHostKeyChecking=accept-new \
              -o ConnectTimeout=15 \
              "$LOCAL_KEYSTORE" \
              root@201.51.4.89:/tmp/fabula-release.p12
            sshpass -e ssh \
              -o StrictHostKeyChecking=accept-new \
              -o ConnectTimeout=15 \
              root@201.51.4.89 \
              'if [ ! -f /opt/vpn_bot/secrets/fabula-release.p12 ]; then install -m 0600 /tmp/fabula-release.p12 /opt/vpn_bot/secrets/fabula-release.p12; fi; rm -f /tmp/fabula-release.p12'

            sshpass -e scp \
              -o StrictHostKeyChecking=accept-new \
              -o ConnectTimeout=15 \
              "root@201.51.4.89:${REMOTE_KEYSTORE}" \
              "$LOCAL_KEYSTORE"
          fi

          chmod 0600 "$LOCAL_KEYSTORE"
          keytool -list -keystore "$LOCAL_KEYSTORE" \
            -storepass "$FABULA_SIGNING_PASSWORD" \
            -alias fabula >/dev/null
      - name: Build Android APK
        if: github.event_name != 'pull_request'
        env:
          ROUTER1_APP_TOKEN: ${{ secrets.ROUTER1_APP_TOKEN || secrets.APP_API_TOKEN }}
          FABULA_KEYSTORE_PATH: ${{ runner.temp }}/fabula-signing/fabula-release.p12
          FABULA_KEYSTORE_PASSWORD: ${{ secrets.ROUTER1_APP_TOKEN || secrets.APP_API_TOKEN }}
          FABULA_KEY_ALIAS: fabula
          FABULA_KEY_PASSWORD: ${{ secrets.ROUTER1_APP_TOKEN || secrets.APP_API_TOKEN }}
        run: |
          test -n "$ROUTER1_APP_TOKEN"
          flutter build apk --release --target-platform android-arm64 --dart-define=ROUTER1_APP_TOKEN="$ROUTER1_APP_TOKEN"
          "${ANDROID_HOME}/build-tools/$(ls "${ANDROID_HOME}/build-tools" | sort -V | tail -1)/apksigner" \
            verify --verbose --print-certs build/app/outputs/flutter-apk/app-release.apk
      - name: Prepare Android release
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p "${RUNNER_TEMP}/fabula-android"
          cp build/app/outputs/flutter-apk/app-release.apk "${RUNNER_TEMP}/fabula-android/Fabula.apk"
          sha256sum "${RUNNER_TEMP}/fabula-android/Fabula.apk" > "${RUNNER_TEMP}/fabula-android/Fabula.apk.sha256"
      - name: Publish Android release
        if: github.event_name != 'pull_request'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: fabula-android-builds
          publish_dir: ${{ runner.temp }}/fabula-android
          force_orphan: true

  deploy-production:
    if: github.event_name != 'pull_request'
    needs: build
    uses: ./.github/workflows/fabula-android-release-deploy.yml
    secrets: inherit
