name: Router1 live network diagnostic

on:
  pull_request:
    branches:
      - fabula

permissions:
  contents: read

jobs:
  inspect-live-network:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SSHPASS: ${{ secrets.MSK_SSH_PASSWORD }}
      FABULA_TEST_PHONE: ${{ secrets.FABULA_TEST_PHONE }}
    steps:
      - name: Check MSK and VPN nodes without exposing keys
        shell: bash
        run: |
          set -euo pipefail
          test -n "${SSHPASS:-}"
          test -n "${FABULA_TEST_PHONE:-}"
          sudo apt-get update -qq
          sudo apt-get install -y -qq sshpass
          {
            printf '%s\n' "$FABULA_TEST_PHONE"
            cat <<'REMOTE'
          set -euo pipefail
          cd /opt/vpn_bot
          umask 077
          echo "DIAG_TIME_UTC=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          for unit in vpn-bot router1-site-api platega-webhook; do
            state=$(systemctl is-active "$unit" 2>/dev/null || true)
            echo "MSK_SERVICE name=$unit state=${state:-missing}"
          done
          api_code=$(curl -sS -m 10 -o /tmp/router1_health.json -w '%{http_code}' \
            http://127.0.0.1:8000/api/health || true)
          echo "MSK_API_HEALTH http=${api_code:-000}"

          venv/bin/python - <<'PY'
          from __future__ import annotations

          import json
          import os
          import sqlite3
          from pathlib import Path

          def digits(value: object) -> str:
              return ''.join(ch for ch in str(value or '') if ch.isdigit())

          def canonical(value: object) -> str:
              value_digits = digits(value)
              return value_digits[-10:] if len(value_digits) >= 10 else ''

          requested = canonical(os.environ.get('FABULA_TEST_PHONE', ''))
          conn = sqlite3.connect('/opt/vpn_bot/database.db')
          conn.row_factory = sqlite3.Row
          clients = conn.execute('SELECT * FROM clients').fetchall()
          matched = [
              row for row in clients
              if any(
                  canonical(row[key]) == requested
                  for key in row.keys()
                  if 'phone' in key.lower()
              )
          ]
          if len(matched) != 1:
              raise SystemExit(f'Expected one client; found {len(matched)}')
          client_id = int(matched[0]['id'])
          configs = conn.execute(
              "SELECT id, device_type, protocol, server_code, status, payment_status, "
              "paid_until, public_key FROM client_configs WHERE client_id = ? ORDER BY id DESC",
              (client_id,),
          ).fetchall()
          safe_configs = [
              {
                  'id': row['id'],
                  'device_type': row['device_type'],
                  'protocol': row['protocol'],
                  'server_code': row['server_code'],
                  'status': row['status'],
                  'payment_status': row['payment_status'],
                  'paid_until': row['paid_until'],
                  'public_key_present': bool(row['public_key']),
              }
              for row in configs[:12]
          ]
          print('CLIENT_NETWORK_CONFIGS=' + json.dumps(safe_configs, sort_keys=True))

          primary = next(
              (
                  row for row in configs
                  if row['device_type'] == 'smartphone_test'
                  and row['protocol'] == 'amneziawg'
                  and row['status'] in ('active', 'paid')
                  and row['public_key']
              ),
              None,
          )
          key_path = Path('/tmp/router1_diag_primary_public_key')
          if primary is not None:
              key_path.write_text(str(primary['public_key']), encoding='utf-8')
              os.chmod(key_path, 0o600)
              print(
                  'PRIMARY_TARGET '
                  f"config_id={primary['id']} server={primary['server_code']} key_ready=true"
              )
          else:
              print('PRIMARY_TARGET key_ready=false')

          try:
              servers = conn.execute('SELECT * FROM vpn_servers ORDER BY priority, id').fetchall()
          except sqlite3.Error:
              servers = []
          server_report = []
          for row in servers:
              item = {}
              for key in (
                  'id', 'code', 'server_code', 'protocol', 'health_status',
                  'status', 'priority', 'weight', 'last_checked_at', 'updated_at',
              ):
                  if key in row.keys():
                      item[key] = row[key]
              server_report.append(item)
          print('VPN_SERVERS=' + json.dumps(server_report, sort_keys=True))
          conn.close()
          PY

          node_diag() {
            label=$1
            host=$2
            port=$3
            iface=$4
            output=$(ssh -o BatchMode=yes -o ConnectTimeout=8 -o StrictHostKeyChecking=accept-new \
              -p "$port" "root@$host" "bash -s -- '$iface'" <<'NODE' 2>&1 || true
          set -u
          iface=$1
          tool=$(command -v awg || command -v wg || true)
          if [ -z "$tool" ]; then
            echo "tool=missing"
            exit 0
          fi
          if ! "$tool" show "$iface" >/dev/null 2>&1; then
            echo "interface=down tool=$(basename "$tool")"
            exit 0
          fi
          peers=$("$tool" show "$iface" peers 2>/dev/null | wc -l | tr -d ' ')
          newest=$("$tool" show "$iface" latest-handshakes 2>/dev/null | awk 'BEGIN{m=0} {if($2>m)m=$2} END{print m}')
          now=$(date +%s)
          if [ "${newest:-0}" -gt 0 ]; then age=$((now-newest)); else age=-1; fi
          xray=$(systemctl is-active xray 2>/dev/null || true)
          forward=$(sysctl -n net.ipv4.ip_forward 2>/dev/null || true)
          http=$(curl -sS -m 8 -o /dev/null -w '%{http_code}' https://www.google.com/generate_204 || true)
          echo "interface=up tool=$(basename "$tool") peers=$peers newest_handshake_age=$age xray=${xray:-unknown} ip_forward=${forward:-unknown} outbound_http=${http:-000}"
          NODE
          )
            output=$(printf '%s' "$output" | tr '\n' ' ' | sed 's/[[:space:]]\+/ /g')
            echo "VPN_NODE label=$label $output"
          }

          node_diag FR-custom 213.176.93.13 5443 awgfr1
          node_diag FR-22 213.176.93.13 22 awgfr1
          node_diag NL2-custom 201.51.23.60 5445 awgnl2
          node_diag NL2-22 201.51.23.60 22 awgnl2

          if [ -s /tmp/router1_diag_primary_public_key ]; then
            target_b64=$(base64 -w0 /tmp/router1_diag_primary_public_key)
            ssh -o BatchMode=yes -o ConnectTimeout=8 -o StrictHostKeyChecking=accept-new \
              -p 5443 root@213.176.93.13 \
              "TARGET_B64='$target_b64' bash -s" <<'PEER' || true
          target=$(printf '%s' "$TARGET_B64" | base64 -d)
          now=$(date +%s)
          found=0
          while read -r key stamp; do
            if [ "$key" = "$target" ]; then
              found=1
              if [ "${stamp:-0}" -gt 0 ]; then age=$((now-stamp)); else age=-1; fi
              echo "PRIMARY_PEER present=true handshake_age=$age"
              break
            fi
          done < <(awg show awgfr1 latest-handshakes 2>/dev/null || true)
          if [ "$found" -eq 0 ]; then echo "PRIMARY_PEER present=false"; fi
          PEER
          fi
          rm -f /tmp/router1_diag_primary_public_key /tmp/router1_health.json
          REMOTE
          } | sshpass -e ssh \
            -o StrictHostKeyChecking=accept-new \
            -o ConnectTimeout=15 \
            root@201.51.4.89 \
            'IFS= read -r FABULA_TEST_PHONE; export FABULA_TEST_PHONE; bash -s'

      - name: Try protected port 22 access to AWG nodes
        shell: bash
        run: |
          set -euo pipefail
          inspect_with_password() {
            label=$1
            host=$2
            iface=$3
            output=$(sshpass -e ssh \
              -o ConnectTimeout=8 \
              -o StrictHostKeyChecking=accept-new \
              -p 22 "root@$host" "bash -s -- '$iface'" <<'NODE' 2>&1 || true
          set -u
          iface=$1
          tool=$(command -v awg || command -v wg || true)
          if [ -z "$tool" ]; then echo "authenticated=true tool=missing"; exit 0; fi
          if ! "$tool" show "$iface" >/dev/null 2>&1; then
            echo "authenticated=true interface=down tool=$(basename "$tool")"
            exit 0
          fi
          peers=$("$tool" show "$iface" peers 2>/dev/null | wc -l | tr -d ' ')
          newest=$("$tool" show "$iface" latest-handshakes 2>/dev/null | awk 'BEGIN{m=0} {if($2>m)m=$2} END{print m}')
          now=$(date +%s)
          if [ "${newest:-0}" -gt 0 ]; then age=$((now-newest)); else age=-1; fi
          xray=$(systemctl is-active xray 2>/dev/null || true)
          enabled=$(systemctl is-enabled xray 2>/dev/null || true)
          forward=$(sysctl -n net.ipv4.ip_forward 2>/dev/null || true)
          http=$(curl -sS -m 8 -o /dev/null -w '%{http_code}' https://www.google.com/generate_204 || true)
          echo "authenticated=true interface=up tool=$(basename "$tool") peers=$peers newest_handshake_age=$age xray=${xray:-unknown} xray_enabled=${enabled:-unknown} ip_forward=${forward:-unknown} outbound_http=${http:-000}"
          NODE
          )
            output=$(printf '%s' "$output" | tr '\n' ' ' | sed 's/[[:space:]]\+/ /g')
            echo "PASSWORD_NODE label=$label $output"
          }
          inspect_with_password FR 213.176.93.13 awgfr1
          inspect_with_password NL2 201.51.23.60 awgnl2
