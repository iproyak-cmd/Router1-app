name: Fabula egress check

on:
  push:
    branches: [fabula]
    paths:
      - ".github/workflows/fabula-egress-check.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      SSHPASS: ${{ secrets.MSK_SSH_PASSWORD }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
    steps:
      - name: Confirm OpenRouter from GitHub
        run: |
          code=$(curl -sS -o /tmp/openrouter-body -w '%{http_code}' --max-time 20 \
            -H "Authorization: Bearer $OPENROUTER_API_KEY" \
            -H 'Content-Type: application/json' \
            --data '{"model":"openrouter/free","messages":[{"role":"user","content":"Ответь одним словом: рядом."}],"max_tokens":20}' \
            https://openrouter.ai/api/v1/chat/completions)
          echo "GITHUB_OPENROUTER_HTTP=$code"
          test "$code" = 200
      - name: Check NL access and OpenRouter reachability
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq sshpass
          sshpass -e ssh \
            -o StrictHostKeyChecking=accept-new \
            -o ConnectTimeout=15 \
            root@92.51.46.27 'bash -s' <<'REMOTE'
          set -euo pipefail
          echo "NL_SSH_OK"
          code=$(curl -sS -o /tmp/openrouter-check -w '%{http_code}' --max-time 20 \
            https://openrouter.ai/api/v1/models)
          echo "NL_OPENROUTER_HTTP=$code"
          test "$code" = 200
          REMOTE
