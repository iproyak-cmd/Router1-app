name: Apply Fabula lifetime grants

on:
  workflow_dispatch:
  push:
    branches: [fabula]
    paths: [".github/workflows/fabula-prod-apply.yml"]

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    env:
      SSHPASS: ${{ secrets.MSK_SSH_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fabula

      - name: Install SSH helper
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq sshpass

      - name: Grant lifetime access atomically
        run: |
          sshpass -e ssh -o StrictHostKeyChecking=accept-new -o ConnectTimeout=15 root@201.51.4.89 'bash -s' > fabula-apply-result.txt <<'REMOTE'
          set -Eeuo pipefail
          ROOT=/opt/vpn_bot
          STAMP=$(date -u +%Y%m%dT%H%M%SZ)
          BACKUP="$ROOT/backups/fabula_lifetime_$STAMP"
          mkdir -p "$BACKUP"
          cp -a "$ROOT/database.db" "$BACKUP/database.db"
          ROOT="$ROOT" "$ROOT/venv/bin/python" - <<'PY'
          import os
          import sqlite3
          from datetime import datetime, timezone
          from pathlib import Path

          root = Path(os.environ["ROOT"])
          conn = sqlite3.connect(root / "database.db")
          conn.row_factory = sqlite3.Row
          phones = ("89262508050", "89522613944")
          forever = "2099-12-31T23:59:59+00:00"
          now = datetime.now(timezone.utc).isoformat()
          grants = []

          try:
              conn.execute("BEGIN IMMEDIATE")
              for digits in phones:
                  clients = conn.execute(
                      "SELECT id FROM clients WHERE phone_normalized LIKE ?",
                      ("%" + digits[-10:],),
                  ).fetchall()
                  assert len(clients) == 1, (
                      f"lifetime client {digits}: match count={len(clients)}"
                  )
                  client_id = int(clients[0]["id"])
                  rows = conn.execute(
                      "SELECT id FROM client_configs WHERE client_id=? AND COALESCE(config_path, conf_path, '')!=''",
                      (client_id,),
                  ).fetchall()
                  config_ids = [int(row[0]) for row in rows]
                  assert config_ids, (
                      f"lifetime client {digits}: no generated Fabula config"
                  )
                  marks = ",".join("?" * len(config_ids))
                  conn.execute(
                      f"UPDATE client_configs SET status='active', payment_status='manual_grant', paid_until=?, subscription_type='lifetime', period='lifetime', amount=0, blocked_at=NULL, block_reason=NULL, unblocked_at=? WHERE id IN ({marks})",
                      (forever, now, *config_ids),
                  )
                  conn.execute(
                      "UPDATE clients SET status='active', paid_until=?, next_payment_date=?, monthly_fee=0, tariff='Fabula lifetime', updated_at=? WHERE id=?",
                      (forever, forever, now, client_id),
                  )
                  conn.execute(
                      "UPDATE fabula_access_claims SET status='active', updated_at=? WHERE client_id=?",
                      (now, client_id),
                  )
                  grants.append((digits, client_id, len(config_ids)))
              conn.commit()
          except Exception:
              conn.rollback()
              raise
          finally:
              conn.close()

          for digits, client_id, count in grants:
              print("LIFETIME_GRANT_OK", digits, client_id, count)
          PY
          systemctl restart router1-site-api
          systemctl is-active --quiet router1-site-api
          echo "APPLY_OK"
          echo "BACKUP=$BACKUP"
          REMOTE

      - name: Save sanitized result
        if: always()
        run: |
          git config user.name codex-production-apply
          git config user.email codex@router1.local
          test -f fabula-apply-result.txt || echo APPLY_STEP_FAILED > fabula-apply-result.txt
          git add fabula-apply-result.txt
          git commit -m "codex: record Fabula lifetime grant result" || true
          git push origin HEAD:fabula
