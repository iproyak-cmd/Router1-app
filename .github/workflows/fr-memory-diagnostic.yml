name: FR memory diagnostic

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/fr-memory-diagnostic.yml"

permissions:
  contents: read

jobs:
  inspect:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 8
    env:
      SSHPASS: ${{ secrets.FR_SSH_PASSWORD || secrets.FABULA_FR_SSH_PASSWORD }}
    steps:
      - name: Inspect FR memory without changes
        shell: bash
        run: |
          set -euo pipefail
          test -n "${SSHPASS:-}"
          sudo apt-get update -qq
          sudo apt-get install -y -qq sshpass
          connect() {
            local port="$1"
            SSHPASS="$SSHPASS" sshpass -e ssh               -p "$port"               -o StrictHostKeyChecking=accept-new               -o ConnectTimeout=15               root@213.176.93.13 'bash -s' <<'REMOTE'
          set -u
          echo "=== IDENTITY ==="
          hostname
          date -u
          uptime
          echo "=== MEMORY ==="
          free -h
          echo "=== MEMINFO ==="
          awk '/^(MemTotal|MemFree|MemAvailable|Buffers|Cached|SReclaimable|Shmem|SwapTotal|SwapFree):/ {print}' /proc/meminfo
          echo "=== VMSTAT ==="
          vmstat 1 3
          echo "=== TOP MEMORY PROCESSES ==="
          ps axo pid,ppid,user,%mem,rss,vsz,stat,comm,args --sort=-rss | head -20
          echo "=== CGROUP MEMORY ==="
          systemd-cgtop -b -n 1 --depth=3 2>/dev/null | head -30 || true
          echo "=== OOM CURRENT BOOT ==="
          journalctl -k -b --no-pager 2>/dev/null | grep -Ei 'out of memory|oom-killer|killed process' | tail -30 || true
          echo "=== OOM PREVIOUS BOOT ==="
          journalctl -k -b -1 --no-pager 2>/dev/null | grep -Ei 'out of memory|oom-killer|killed process' | tail -30 || true
          echo "=== DISK ==="
          df -hT /
          echo "=== FAILED SERVICES ==="
          systemctl --failed --no-pager || true
          REMOTE
          }
          connect 5443 || connect 22
