name: Fabula PR Checks

on:
  pull_request:
    branches: [fabula]
    paths:
      - ".github/workflows/fabula-pr-checks.yml"
      - "lib/**"
      - "test/**"
      - "android/**"
      - "windows/**"
      - "pubspec.yaml"
      - "pubspec.lock"

permissions:
  contents: read

concurrency:
  group: fabula-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Install dependencies
        run: flutter pub get
      - name: Analyze
        run: flutter analyze --no-fatal-infos
      - name: Test
        run: flutter test
      - name: Build Android test APK
        env:
          ROUTER1_APP_TOKEN: ${{ secrets.ROUTER1_APP_TOKEN || secrets.APP_API_TOKEN }}
        run: |
          test -n "$ROUTER1_APP_TOKEN"
          flutter build apk --debug --target-platform android-arm64 \
            --dart-define=ROUTER1_APP_TOKEN="$ROUTER1_APP_TOKEN" \
            --dart-define=FABULA_DEMO_DEVICE_ID=74
          cp build/app/outputs/flutter-apk/app-debug.apk Fabula-test.apk
      - name: Upload Android test APK
        uses: actions/upload-artifact@v4
        with:
          name: Fabula-Android-Test
          path: Fabula-test.apk
          if-no-files-found: error
