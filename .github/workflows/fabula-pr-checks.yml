name: Fabula PR Checks

on:
  pull_request:
    branches: [fabula]
    paths:
      - ".github/workflows/fabula-pr-checks.yml"
      - "lib/**"
      - "test/**"
      - "android/**"
      - "windows/**"
      - "pubspec.yaml"
      - "pubspec.lock"

permissions:
  contents: read

concurrency:
  group: fabula-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Install dependencies
        run: flutter pub get
      - name: Analyze
        run: flutter analyze --no-fatal-infos
      - name: Test
        run: flutter test
