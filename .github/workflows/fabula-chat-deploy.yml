# Fabula companion production deployment.
# Deployment revision: verify the active public TLS route after every change.
name: Deploy Fabula companion

on:
  push:
    branches: [fabula]
    paths:
      - ".github/workflows/fabula-chat-deploy.yml"
      - "server/fabula_chat.py"
      - "server/fabula_chat_http.py"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: fabula-chat-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SSHPASS: ${{ secrets.MSK_SSH_PASSWORD }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      FABULA_CLIENT_API_TOKEN: ${{ secrets.ROUTER1_APP_TOKEN || secrets.APP_API_TOKEN }}
      FABULA_FR_SSH_PASSWORD: ${{ secrets.FABULA_FR_SSH_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - name: Validate deployment secrets
        run: |
          test -n "$SSHPASS"
          test -n "$OPENROUTER_API_KEY"
          test -n "$FABULA_CLIENT_API_TOKEN"
          test -n "$FABULA_FR_SSH_PASSWORD"
          case "$OPENROUTER_API_KEY" in sk-or-v1-*) ;; *) exit 1 ;; esac
      - name: Install SSH client helper
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq sshpass
      - name: Upload companion service
        run: |
          umask 077
          printf '%s' "$OPENROUTER_API_KEY" > "$RUNNER_TEMP/openrouter.key"
          printf '%s' "$FABULA_CLIENT_API_TOKEN" > "$RUNNER_TEMP/fabula-client.key"
          printf '%s' "$FABULA_FR_SSH_PASSWORD" > "$RUNNER_TEMP/fabula-fr-ssh-password"
          sshpass -e scp \
            -o StrictHostKeyChecking=accept-new \
            -o ConnectTimeout=15 \
            server/fabula_chat.py \
            server/fabula_chat_http.py \
            "$RUNNER_TEMP/openrouter.key" \
            "$RUNNER_TEMP/fabula-client.key" \
            "$RUNNER_TEMP/fabula-fr-ssh-password" \
            root@201.51.4.89:/tmp/
      - name: Deploy with backup, verification and rollback
        shell: bash
        run: |
          sshpass -e ssh \
            -o StrictHostKeyChecking=accept-new \
            -o ConnectTimeout=15 \
            root@201.51.4.89 'bash -s' <<'REMOTE'
          set -Eeuo pipefail

          ROOT=/opt/vpn_bot
          ENV_FILE="$ROOT/.env"
          UNIT=/etc/systemd/system/fabula-chat.service
          STAMP=$(date -u +%Y%m%dT%H%M%SZ)
          BACKUP_DIR="$ROOT/backups/fabula_chat_$STAMP"
          mkdir -p "$BACKUP_DIR"
          OPENROUTER_API_KEY=$(cat /tmp/openrouter.key)
          FABULA_CLIENT_API_TOKEN=$(cat /tmp/fabula-client.key)
          GITHUB_FR_SSH_PASSWORD=$(cat /tmp/fabula-fr-ssh-password)
          rm -f /tmp/openrouter.key /tmp/fabula-client.key /tmp/fabula-fr-ssh-password
          export OPENROUTER_API_KEY FABULA_CLIENT_API_TOKEN GITHUB_FR_SSH_PASSWORD

          echo "FABULA_EGRESS_DIAGNOSTIC"
          ip -brief address
          ip route show
          ss -lntup \
            | grep -E '(:1080|:10808|:2080|:3128|:7890|:8080|xray|sing-box)' \
            || true
          systemctl list-units --type=service --all --no-legend \
            | grep -Ei '(xray|sing-box|wireguard|wg-quick|proxy)' \
            || true
          python3 - <<'PY'
          from pathlib import Path
          import re
          names = []
          for raw in Path('/opt/vpn_bot/.env').read_text(encoding='utf-8').splitlines():
              if '=' not in raw or raw.lstrip().startswith('#'):
                  continue
              name = raw.split('=', 1)[0].strip()
              if re.search(r'(SSH|NL2|FR|R1PRO|SERVER)', name, re.I):
                  names.append(name)
          print('FABULA_AVAILABLE_ENV_KEYS=' + ','.join(sorted(names)))
          PY
          for target in '92.51.46.27 22 NL' '201.51.23.60 5445 NL2' '213.176.93.13 5443 FR'; do
            set -- $target
            host=$1 port=$2 label=$3
            if ssh -o BatchMode=yes -o ConnectTimeout=8 \
              -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
              -p "$port" "root@$host" \
              "code=\$(curl -sS -o /dev/null -w '%{http_code}' --max-time 12 https://openrouter.ai/api/v1/models); echo ${label}_SSH_OK_OPENROUTER=\$code"; then
              :
            else
              echo "${label}_SSH_UNAVAILABLE"
            fi
          done

          CONFIG_LIST="$BACKUP_DIR/nginx-config-paths"
          python3 - <<'PY' >"$CONFIG_LIST"
          import re
          import subprocess

          rendered = subprocess.run(
              ["nginx", "-T"], check=True, text=True,
              stdout=subprocess.PIPE, stderr=subprocess.STDOUT,
          ).stdout
          sections = re.split(r"^# configuration file (.+?):\n", rendered, flags=re.M)
          paths = []
          for index in range(1, len(sections), 2):
              path, text = sections[index], sections[index + 1]
              for match in re.finditer(r"server\s*\{", text):
                  depth = 0
                  end = None
                  for offset in range(text.find("{", match.start()), len(text)):
                      if text[offset] == "{":
                          depth += 1
                      elif text[offset] == "}":
                          depth -= 1
                          if depth == 0:
                              end = offset + 1
                              break
                  block = text[match.start():end] if end else ""
                  if (
                      re.search(r"server_name[^;]*router1\.tech[^;]*;", block)
                      and re.search(r"listen\s+(?:\[[^]]+\]:)?443(?:\s|;)", block)
                  ):
                      if path not in paths:
                          paths.append(path)
                      break
          if not paths:
              raise SystemExit("router1.tech TLS nginx config not found")
          print(*paths, sep="\n")
          PY

          while IFS= read -r config; do
            relative=${config#/}
            mkdir -p "$BACKUP_DIR/nginx/$(dirname "$relative")"
            cp -a "$config" "$BACKUP_DIR/nginx/$relative"
          done <"$CONFIG_LIST"
          cp -a "$ENV_FILE" "$BACKUP_DIR/env"
          if [ -f "$UNIT" ]; then cp -a "$UNIT" "$BACKUP_DIR/service.unit"; else touch "$BACKUP_DIR/service.unit.missing"; fi
          for name in fabula_chat.py fabula_chat_http.py; do
            if [ -f "$ROOT/$name" ]; then cp -a "$ROOT/$name" "$BACKUP_DIR/$name"; else touch "$BACKUP_DIR/$name.missing"; fi
          done

          rollback() {
            set +e
            while IFS= read -r config; do
              cp -a "$BACKUP_DIR/nginx/${config#/}" "$config"
            done <"$CONFIG_LIST"
            cp -a "$BACKUP_DIR/env" "$ENV_FILE"
            for name in fabula_chat.py fabula_chat_http.py; do
              if [ -f "$BACKUP_DIR/$name.missing" ]; then rm -f "$ROOT/$name"; else cp -a "$BACKUP_DIR/$name" "$ROOT/$name"; fi
            done
            if [ -f "$BACKUP_DIR/service.unit.missing" ]; then
              systemctl disable --now fabula-chat.service || true
              rm -f "$UNIT"
            else
              cp -a "$BACKUP_DIR/service.unit" "$UNIT"
            fi
            systemctl daemon-reload
            systemctl restart fabula-chat.service || true
            nginx -t && systemctl reload nginx
            echo "ROLLBACK_OK backup=$BACKUP_DIR"
          }
          trap rollback ERR

          install -m 0644 /tmp/fabula_chat.py "$ROOT/fabula_chat.py"
          install -m 0644 /tmp/fabula_chat_http.py "$ROOT/fabula_chat_http.py"
          python3 -m py_compile "$ROOT/fabula_chat.py" "$ROOT/fabula_chat_http.py"

          OPENROUTER_API_KEY="$OPENROUTER_API_KEY" FABULA_CLIENT_API_TOKEN="$FABULA_CLIENT_API_TOKEN" ENV_FILE="$ENV_FILE" python3 - <<'PY'
          import os
          from pathlib import Path

          path = Path(os.environ["ENV_FILE"])
          key = os.environ["OPENROUTER_API_KEY"].strip()
          client_key = os.environ["FABULA_CLIENT_API_TOKEN"].strip()
          lines = path.read_text(encoding="utf-8").splitlines()
          output = []
          replaced = set()
          for line in lines:
              if line.strip().startswith("OPENROUTER_API_KEY="):
                  output.append(f"OPENROUTER_API_KEY={key}")
                  replaced.add("openrouter")
              elif line.strip().startswith("FABULA_CLIENT_API_TOKEN="):
                  output.append(f"FABULA_CLIENT_API_TOKEN={client_key}")
                  replaced.add("client")
              else:
                  output.append(line)
          if "openrouter" not in replaced:
              output.append(f"OPENROUTER_API_KEY={key}")
          if "client" not in replaced:
              output.append(f"FABULA_CLIENT_API_TOKEN={client_key}")
          path.write_text("\n".join(output) + "\n", encoding="utf-8")
          os.chmod(path, 0o600)
          PY

          mapfile -t R1PRO_VALUES < <(python3 - <<'PY'
          from pathlib import Path
          values = {}
          for raw in Path('/opt/vpn_bot/.env').read_text(encoding='utf-8').splitlines():
              if '=' in raw and not raw.lstrip().startswith('#'):
                  key, value = raw.split('=', 1)
                  values[key.strip()] = value.strip().strip('"').strip("'")
          for name in (
              'R1PRO_HOST', 'R1PRO_PORT', 'R1PRO_SSH_PASSWORD',
              'R1PRO_FR_SSH_PASSWORD', 'R1PRO_NL2_SSH_PASSWORD',
          ):
              print(values.get(name, ''))
          PY
          )
          R1PRO_HOST=${R1PRO_VALUES[0]}
          R1PRO_PORT=${R1PRO_VALUES[1]}
          R1PRO_SSH_PASSWORD=${R1PRO_VALUES[2]}
          FR_SSH_PASSWORD=${R1PRO_VALUES[3]}
          NL2_SSH_PASSWORD=${R1PRO_VALUES[4]}
          command -v sshpass >/dev/null
          SELECTED_HOST=
          SELECTED_PORT=
          SELECTED_PASSWORD=
          for candidate in \
            "213.176.93.13|22|$GITHUB_FR_SSH_PASSWORD" \
            "213.176.93.13|5443|$GITHUB_FR_SSH_PASSWORD" \
            "$R1PRO_HOST|$R1PRO_PORT|$R1PRO_SSH_PASSWORD" \
            "213.176.93.13|5443|$FR_SSH_PASSWORD" \
            "213.176.93.13|22|$FR_SSH_PASSWORD" \
            "201.51.23.60|5445|$NL2_SSH_PASSWORD" \
            "201.51.23.60|22|$NL2_SSH_PASSWORD"; do
            IFS='|' read -r host port password <<EOF
          $candidate
          EOF
            if [ -z "$host" ] || [ -z "$port" ] || [ -z "$password" ]; then continue; fi
            export SSHPASS="$password"
            if sshpass -e ssh -p "$port" \
              -o StrictHostKeyChecking=accept-new -o ConnectTimeout=8 \
              "root@$host" 'curl -fsS --max-time 12 https://openrouter.ai/api/v1/models >/dev/null'; then
              SELECTED_HOST=$host
              SELECTED_PORT=$port
              SELECTED_PASSWORD=$password
              break
            fi
          done
          test -n "$SELECTED_HOST"
          export SSHPASS="$SELECTED_PASSWORD"
          FABULA_EGRESS_HOST="$SELECTED_HOST" FABULA_EGRESS_PORT="$SELECTED_PORT" FABULA_EGRESS_PASSWORD="$SELECTED_PASSWORD" ENV_FILE="$ENV_FILE" python3 - <<'PY'
          import os
          from pathlib import Path
          path = Path(os.environ['ENV_FILE'])
          replacements = {
              'FABULA_EGRESS_HOST': os.environ['FABULA_EGRESS_HOST'],
              'FABULA_EGRESS_PORT': os.environ['FABULA_EGRESS_PORT'],
              'FABULA_EGRESS_SSH_PASSWORD': os.environ['FABULA_EGRESS_PASSWORD'],
          }
          output = []
          seen = set()
          for line in path.read_text(encoding='utf-8').splitlines():
              key = line.split('=', 1)[0].strip() if '=' in line else ''
              if key in replacements:
                  output.append(f'{key}={replacements[key]}')
                  seen.add(key)
              else:
                  output.append(line)
          for key, value in replacements.items():
              if key not in seen:
                  output.append(f'{key}={value}')
          path.write_text('\n'.join(output) + '\n', encoding='utf-8')
          os.chmod(path, 0o600)
          PY
          printf '%s' "$OPENROUTER_API_KEY" > /tmp/fr-openrouter.key
          printf '%s' "$FABULA_CLIENT_API_TOKEN" > /tmp/fr-fabula-client.key
          chmod 600 /tmp/fr-openrouter.key /tmp/fr-fabula-client.key
          sshpass -e scp -P "$SELECTED_PORT" \
            -o StrictHostKeyChecking=accept-new -o ConnectTimeout=15 \
            /tmp/fabula_chat.py /tmp/fabula_chat_http.py \
            /tmp/fr-openrouter.key /tmp/fr-fabula-client.key \
            "root@$SELECTED_HOST:/tmp/"
          rm -f /tmp/fr-openrouter.key /tmp/fr-fabula-client.key
          sshpass -e ssh -p "$SELECTED_PORT" \
            -o StrictHostKeyChecking=accept-new -o ConnectTimeout=15 \
            "root@$SELECTED_HOST" 'bash -s' <<'FRREMOTE'
          set -Eeuo pipefail
          install -d -m 0700 /opt/fabula-chat
          install -m 0644 /tmp/fabula_chat.py /opt/fabula-chat/fabula_chat.py
          install -m 0644 /tmp/fabula_chat_http.py /opt/fabula-chat/fabula_chat_http.py
          python3 -m py_compile /opt/fabula-chat/fabula_chat.py /opt/fabula-chat/fabula_chat_http.py
          OPENROUTER_API_KEY=$(cat /tmp/fr-openrouter.key)
          FABULA_CLIENT_API_TOKEN=$(cat /tmp/fr-fabula-client.key)
          rm -f /tmp/fr-openrouter.key /tmp/fr-fabula-client.key
          APP_API_TOKEN=$(python3 - <<'PY'
          from pathlib import Path
          values = {}
          path = Path('/opt/vpn_bot/.env')
          if path.exists():
              for raw in path.read_text(encoding='utf-8').splitlines():
                  if '=' in raw and not raw.lstrip().startswith('#'):
                      key, value = raw.split('=', 1)
                      values[key.strip()] = value.strip().strip('"').strip("'")
          print(values.get('APP_API_TOKEN', ''))
          PY
          )
          if [ -z "$APP_API_TOKEN" ]; then APP_API_TOKEN="$FABULA_CLIENT_API_TOKEN"; fi
          umask 077
          {
            printf 'OPENROUTER_API_KEY=%s\n' "$OPENROUTER_API_KEY"
            printf 'FABULA_CLIENT_API_TOKEN=%s\n' "$FABULA_CLIENT_API_TOKEN"
            printf 'APP_API_TOKEN=%s\n' "$APP_API_TOKEN"
          } >/opt/fabula-chat/.env
          cat >/etc/systemd/system/fabula-chat.service <<'UNITFILE'
          [Unit]
          Description=Fabula AI companion gateway (FR egress)
          After=network-online.target
          Wants=network-online.target

          [Service]
          Type=simple
          User=root
          WorkingDirectory=/opt/fabula-chat
          EnvironmentFile=/opt/fabula-chat/.env
          Environment=FABULA_CHAT_HOST=127.0.0.1
          Environment=FABULA_CHAT_PORT=18012
          Environment=FABULA_CHAT_DAILY_LIMIT=50
          Environment=FABULA_CHAT_ANONYMOUS_DAILY_LIMIT=10
          Environment=OPENROUTER_MODEL=openrouter/free
          ExecStart=/usr/bin/python3 /opt/fabula-chat/fabula_chat_http.py
          Restart=always
          RestartSec=3
          NoNewPrivileges=true
          PrivateTmp=true
          ProtectSystem=full

          [Install]
          WantedBy=multi-user.target
          UNITFILE
          systemctl daemon-reload
          systemctl enable fabula-chat.service
          systemctl restart fabula-chat.service
          curl -fsS --max-time 8 http://127.0.0.1:18012/health \
            | python3 -c 'import json,sys; assert json.load(sys.stdin)["ok"] is True'
          FRREMOTE

          cat >"$UNIT" <<'UNITFILE'
          [Unit]
          Description=Fabula AI companion tunnel to FR
          After=network-online.target
          Wants=network-online.target

          [Service]
          Type=simple
          User=root
          EnvironmentFile=/opt/vpn_bot/.env
          ExecStart=/bin/bash -c 'export SSHPASS="$FABULA_EGRESS_SSH_PASSWORD"; exec /usr/bin/sshpass -e /usr/bin/ssh -N -T -p "$FABULA_EGRESS_PORT" -o ExitOnForwardFailure=yes -o ServerAliveInterval=30 -o ServerAliveCountMax=3 -o StrictHostKeyChecking=accept-new -L 127.0.0.1:8012:127.0.0.1:18012 "root@$FABULA_EGRESS_HOST"'
          Restart=always
          RestartSec=3
          NoNewPrivileges=true
          PrivateTmp=true
          ProtectSystem=full

          [Install]
          WantedBy=multi-user.target
          UNITFILE

          systemctl daemon-reload
          systemctl enable --now fabula-chat.service

          CONFIG_LIST="$CONFIG_LIST" python3 - <<'PY'
          import os
          import pathlib
          import re

          marker = "# FABULA_CHAT"
          location = """
              # FABULA_CHAT
              location = /api/fabula/chat {
                  limit_except POST { deny all; }
                  proxy_pass http://127.0.0.1:8012;
                  proxy_http_version 1.1;
                  proxy_set_header Host $host;
                  proxy_set_header Authorization $http_authorization;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  add_header X-Fabula-Route active always;
                  proxy_connect_timeout 5s;
                  proxy_read_timeout 50s;
                  client_max_body_size 64k;
              }
          """

          for raw_path in pathlib.Path(os.environ["CONFIG_LIST"]).read_text().splitlines():
              path = pathlib.Path(raw_path)
              text = path.read_text(encoding="utf-8")

              while marker in text:
                  marker_start = text.index(marker)
                  location_start = text.find("location", marker_start)
                  brace_start = text.find("{", location_start)
                  if location_start < 0 or brace_start < 0:
                      raise SystemExit(f"malformed FABULA_CHAT block in {path}")
                  depth = 0
                  location_end = None
                  for index in range(brace_start, len(text)):
                      if text[index] == "{":
                          depth += 1
                      elif text[index] == "}":
                          depth -= 1
                          if depth == 0:
                              location_end = index + 1
                              break
                  if location_end is None:
                      raise SystemExit(f"unterminated FABULA_CHAT block in {path}")
                  line_start = text.rfind("\n", 0, marker_start) + 1
                  text = text[:line_start] + text[location_end:]

              targets = []
              for match in re.finditer(r"server\s*\{", text):
                  start = match.start()
                  depth = 0
                  end = None
                  for index in range(text.find("{", start), len(text)):
                      if text[index] == "{":
                          depth += 1
                      elif text[index] == "}":
                          depth -= 1
                          if depth == 0:
                              end = index
                              break
                  if end is None:
                      continue
                  block = text[start:end + 1]
                  if (
                      re.search(r"server_name[^;]*router1\.tech[^;]*;", block)
                      and re.search(r"listen\s+(?:\[[^]]+\]:)?443(?:\s|;)", block)
                  ):
                      targets.append(end)
              if not targets:
                  raise SystemExit(f"router1.tech TLS server block not found in {path}")
              for end in reversed(targets):
                  text = text[:end] + location + text[end:]
              path.write_text(text, encoding="utf-8")
          PY

          nginx -t
          systemctl reload nginx
          curl -fsS --max-time 8 http://127.0.0.1:8012/health | python3 -c 'import json,sys; assert json.load(sys.stdin)["ok"] is True'

          curl -sS --max-time 15 \
            -o /tmp/fabula-backend-body \
            -D /tmp/fabula-backend-headers \
            -w 'FABULA_BACKEND_HTTP=%{http_code}\n' \
            -H 'Content-Type: application/json' \
            --data '{"installation_id":"backend-diagnostic","name":"","messages":[{"role":"user","content":"Ответь одним словом: рядом."}]}' \
            http://127.0.0.1:8012/api/fabula/chat \
            || true
          sed -n '1,20p' /tmp/fabula-backend-headers
          sed -n '1,20p' /tmp/fabula-backend-body
          journalctl -u fabula-chat.service --no-pager -n 30 \
            | sed -E 's/sk-or-v1-[A-Za-z0-9_-]+/[REDACTED]/g'

          echo "FABULA_NGINX_ROUTE_DIAGNOSTIC"
          nginx -T 2>&1 \
            | grep -nE 'configuration file|server_name.*router1\.tech|FABULA_CHAT|location = /api/fabula/chat' \
            || true
          curl -sS --max-time 15 \
            -o /tmp/fabula-route-body \
            -D /tmp/fabula-route-headers \
            -w 'FABULA_ROUTE_HTTP=%{http_code}\n' \
            -H 'Content-Type: application/json' \
            --data '{"installation_id":"route-diagnostic","name":"","messages":[{"role":"user","content":"Ответь одним словом: рядом."}]}' \
            https://router1.tech/api/fabula/chat \
            || true
          sed -n '1,20p' /tmp/fabula-route-headers
          sed -n '1,20p' /tmp/fabula-route-body

          test -n "$FABULA_CLIENT_API_TOKEN"
          curl -fsS --max-time 55 \
            -H "Authorization: Bearer $FABULA_CLIENT_API_TOKEN" \
            -H 'Content-Type: application/json' \
            --data '{"installation_id":"deploy-check-001","name":"Анна","messages":[{"role":"user","content":"Мне тревожно. Просто выслушай меня."}]}' \
            https://router1.tech/api/fabula/chat \
            | python3 -c 'import json,sys; data=json.load(sys.stdin); assert data["reply"].strip(); print("CHAT_OK")'

          curl -fsS --max-time 55 \
            -H 'Content-Type: application/json' \
            --data '{"installation_id":"deploy-anonymous-001","name":"","messages":[{"role":"user","content":"Ответь одним словом: рядом."}]}' \
            https://router1.tech/api/fabula/chat \
            | python3 -c 'import json,sys; data=json.load(sys.stdin); assert data["reply"].strip(); print("ANONYMOUS_CHAT_OK")'

          trap - ERR
          echo "DEPLOY_OK backup=$BACKUP_DIR"
          REMOTE

      - name: Verify from outside the production server
        shell: bash
        run: |
          set -euo pipefail
          getent ahostsv4 router1.tech | awk '{print "ROUTER1_DNS_IP=" $1}' | sort -u
          response_file=$(mktemp)
          http_code=$(curl -sS --max-time 55 \
            -o "$response_file" \
            -w '%{http_code}' \
            -H 'Content-Type: application/json' \
            --data '{"installation_id":"github-external-check","name":"","messages":[{"role":"user","content":"Ответь одним словом: рядом."}]}' \
            https://router1.tech/api/fabula/chat)
          echo "FABULA_EXTERNAL_HTTP=$http_code"
          if [ "$http_code" != "200" ]; then
            sed -n '1,20p' "$response_file"
            exit 1
          fi
          jq -e '.reply | strings | length > 0' "$response_file" >/dev/null
          echo "FABULA_EXTERNAL_CHAT_OK"
