# Fabula companion production deployment.
# Deployment revision: verify the active public TLS route after every change.
name: Deploy Fabula companion

on:
  push:
    branches: [fabula]
    paths:
      - ".github/workflows/fabula-chat-deploy.yml"
      - "server/fabula_chat.py"
      - "server/fabula_chat_http.py"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: fabula-chat-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SSHPASS: ${{ secrets.MSK_SSH_PASSWORD }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      FABULA_CLIENT_API_TOKEN: ${{ secrets.ROUTER1_APP_TOKEN || secrets.APP_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Validate deployment secrets
        run: |
          test -n "$SSHPASS"
          test -n "$OPENROUTER_API_KEY"
          test -n "$FABULA_CLIENT_API_TOKEN"
          case "$OPENROUTER_API_KEY" in sk-or-v1-*) ;; *) exit 1 ;; esac
      - name: Install SSH client helper
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq sshpass
      - name: Upload companion service
        run: |
          umask 077
          printf '%s' "$OPENROUTER_API_KEY" > "$RUNNER_TEMP/openrouter.key"
          printf '%s' "$FABULA_CLIENT_API_TOKEN" > "$RUNNER_TEMP/fabula-client.key"
          sshpass -e scp \
            -o StrictHostKeyChecking=accept-new \
            -o ConnectTimeout=15 \
            server/fabula_chat.py \
            server/fabula_chat_http.py \
            "$RUNNER_TEMP/openrouter.key" \
            "$RUNNER_TEMP/fabula-client.key" \
            root@201.51.4.89:/tmp/
      - name: Deploy with backup, verification and rollback
        shell: bash
        run: |
          sshpass -e ssh \
            -o StrictHostKeyChecking=accept-new \
            -o ConnectTimeout=15 \
            root@201.51.4.89 'bash -s' <<'REMOTE'
          set -Eeuo pipefail

          ROOT=/opt/vpn_bot
          ENV_FILE="$ROOT/.env"
          UNIT=/etc/systemd/system/fabula-chat.service
          STAMP=$(date -u +%Y%m%dT%H%M%SZ)
          BACKUP_DIR="$ROOT/backups/fabula_chat_$STAMP"
          mkdir -p "$BACKUP_DIR"
          OPENROUTER_API_KEY=$(cat /tmp/openrouter.key)
          FABULA_CLIENT_API_TOKEN=$(cat /tmp/fabula-client.key)
          rm -f /tmp/openrouter.key /tmp/fabula-client.key
          export OPENROUTER_API_KEY FABULA_CLIENT_API_TOKEN

          CONFIG_LIST="$BACKUP_DIR/nginx-config-paths"
          python3 - <<'PY' >"$CONFIG_LIST"
          import re
          import subprocess

          rendered = subprocess.run(
              ["nginx", "-T"], check=True, text=True,
              stdout=subprocess.PIPE, stderr=subprocess.STDOUT,
          ).stdout
          sections = re.split(r"^# configuration file (.+?):\n", rendered, flags=re.M)
          paths = []
          for index in range(1, len(sections), 2):
              path, text = sections[index], sections[index + 1]
              for match in re.finditer(r"server\s*\{", text):
                  depth = 0
                  end = None
                  for offset in range(text.find("{", match.start()), len(text)):
                      if text[offset] == "{":
                          depth += 1
                      elif text[offset] == "}":
                          depth -= 1
                          if depth == 0:
                              end = offset + 1
                              break
                  block = text[match.start():end] if end else ""
                  if (
                      re.search(r"server_name[^;]*router1\.tech[^;]*;", block)
                      and re.search(r"listen\s+(?:\[[^]]+\]:)?443(?:\s|;)", block)
                  ):
                      if path not in paths:
                          paths.append(path)
                      break
          if not paths:
              raise SystemExit("router1.tech TLS nginx config not found")
          print(*paths, sep="\n")
          PY

          while IFS= read -r config; do
            relative=${config#/}
            mkdir -p "$BACKUP_DIR/nginx/$(dirname "$relative")"
            cp -a "$config" "$BACKUP_DIR/nginx/$relative"
          done <"$CONFIG_LIST"
          cp -a "$ENV_FILE" "$BACKUP_DIR/env"
          if [ -f "$UNIT" ]; then cp -a "$UNIT" "$BACKUP_DIR/service.unit"; else touch "$BACKUP_DIR/service.unit.missing"; fi
          for name in fabula_chat.py fabula_chat_http.py; do
            if [ -f "$ROOT/$name" ]; then cp -a "$ROOT/$name" "$BACKUP_DIR/$name"; else touch "$BACKUP_DIR/$name.missing"; fi
          done

          rollback() {
            set +e
            while IFS= read -r config; do
              cp -a "$BACKUP_DIR/nginx/${config#/}" "$config"
            done <"$CONFIG_LIST"
            cp -a "$BACKUP_DIR/env" "$ENV_FILE"
            for name in fabula_chat.py fabula_chat_http.py; do
              if [ -f "$BACKUP_DIR/$name.missing" ]; then rm -f "$ROOT/$name"; else cp -a "$BACKUP_DIR/$name" "$ROOT/$name"; fi
            done
            if [ -f "$BACKUP_DIR/service.unit.missing" ]; then
              systemctl disable --now fabula-chat.service || true
              rm -f "$UNIT"
            else
              cp -a "$BACKUP_DIR/service.unit" "$UNIT"
            fi
            systemctl daemon-reload
            systemctl restart fabula-chat.service || true
            nginx -t && systemctl reload nginx
            echo "ROLLBACK_OK backup=$BACKUP_DIR"
          }
          trap rollback ERR

          install -m 0644 /tmp/fabula_chat.py "$ROOT/fabula_chat.py"
          install -m 0644 /tmp/fabula_chat_http.py "$ROOT/fabula_chat_http.py"
          python3 -m py_compile "$ROOT/fabula_chat.py" "$ROOT/fabula_chat_http.py"

          OPENROUTER_API_KEY="$OPENROUTER_API_KEY" FABULA_CLIENT_API_TOKEN="$FABULA_CLIENT_API_TOKEN" ENV_FILE="$ENV_FILE" python3 - <<'PY'
          import os
          from pathlib import Path

          path = Path(os.environ["ENV_FILE"])
          key = os.environ["OPENROUTER_API_KEY"].strip()
          client_key = os.environ["FABULA_CLIENT_API_TOKEN"].strip()
          lines = path.read_text(encoding="utf-8").splitlines()
          output = []
          replaced = set()
          for line in lines:
              if line.strip().startswith("OPENROUTER_API_KEY="):
                  output.append(f"OPENROUTER_API_KEY={key}")
                  replaced.add("openrouter")
              elif line.strip().startswith("FABULA_CLIENT_API_TOKEN="):
                  output.append(f"FABULA_CLIENT_API_TOKEN={client_key}")
                  replaced.add("client")
              else:
                  output.append(line)
          if "openrouter" not in replaced:
              output.append(f"OPENROUTER_API_KEY={key}")
          if "client" not in replaced:
              output.append(f"FABULA_CLIENT_API_TOKEN={client_key}")
          path.write_text("\n".join(output) + "\n", encoding="utf-8")
          os.chmod(path, 0o600)
          PY

          cat >"$UNIT" <<'UNITFILE'
          [Unit]
          Description=Fabula AI companion gateway
          After=network-online.target
          Wants=network-online.target

          [Service]
          Type=simple
          User=root
          WorkingDirectory=/opt/vpn_bot
          EnvironmentFile=/opt/vpn_bot/.env
          Environment=FABULA_CHAT_HOST=127.0.0.1
          Environment=FABULA_CHAT_PORT=8012
          Environment=FABULA_CHAT_DAILY_LIMIT=50
          Environment=FABULA_CHAT_ANONYMOUS_DAILY_LIMIT=10
          Environment=OPENROUTER_MODEL=openrouter/free
          ExecStart=/usr/bin/python3 /opt/vpn_bot/fabula_chat_http.py
          Restart=always
          RestartSec=3
          NoNewPrivileges=true
          PrivateTmp=true
          ProtectSystem=full

          [Install]
          WantedBy=multi-user.target
          UNITFILE

          systemctl daemon-reload
          systemctl enable --now fabula-chat.service

          CONFIG_LIST="$CONFIG_LIST" python3 - <<'PY'
          import os
          import pathlib
          import re

          marker = "# FABULA_CHAT"
          location = """
              # FABULA_CHAT
              location = /api/fabula/chat {
                  limit_except POST { deny all; }
                  proxy_pass http://127.0.0.1:8012;
                  proxy_http_version 1.1;
                  proxy_set_header Host $host;
                  proxy_set_header Authorization $http_authorization;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  add_header X-Fabula-Route active always;
                  proxy_connect_timeout 5s;
                  proxy_read_timeout 50s;
                  client_max_body_size 64k;
              }
          """

          for raw_path in pathlib.Path(os.environ["CONFIG_LIST"]).read_text().splitlines():
              path = pathlib.Path(raw_path)
              text = path.read_text(encoding="utf-8")

              while marker in text:
                  marker_start = text.index(marker)
                  location_start = text.find("location", marker_start)
                  brace_start = text.find("{", location_start)
                  if location_start < 0 or brace_start < 0:
                      raise SystemExit(f"malformed FABULA_CHAT block in {path}")
                  depth = 0
                  location_end = None
                  for index in range(brace_start, len(text)):
                      if text[index] == "{":
                          depth += 1
                      elif text[index] == "}":
                          depth -= 1
                          if depth == 0:
                              location_end = index + 1
                              break
                  if location_end is None:
                      raise SystemExit(f"unterminated FABULA_CHAT block in {path}")
                  line_start = text.rfind("\n", 0, marker_start) + 1
                  text = text[:line_start] + text[location_end:]

              targets = []
              for match in re.finditer(r"server\s*\{", text):
                  start = match.start()
                  depth = 0
                  end = None
                  for index in range(text.find("{", start), len(text)):
                      if text[index] == "{":
                          depth += 1
                      elif text[index] == "}":
                          depth -= 1
                          if depth == 0:
                              end = index
                              break
                  if end is None:
                      continue
                  block = text[start:end + 1]
                  if (
                      re.search(r"server_name[^;]*router1\.tech[^;]*;", block)
                      and re.search(r"listen\s+(?:\[[^]]+\]:)?443(?:\s|;)", block)
                  ):
                      targets.append(end)
              if not targets:
                  raise SystemExit(f"router1.tech TLS server block not found in {path}")
              for end in reversed(targets):
                  text = text[:end] + location + text[end:]
              path.write_text(text, encoding="utf-8")
          PY

          nginx -t
          systemctl reload nginx
          curl -fsS --max-time 8 http://127.0.0.1:8012/health | python3 -c 'import json,sys; assert json.load(sys.stdin)["ok"] is True'

          curl -sS --max-time 15 \
            -o /tmp/fabula-backend-body \
            -D /tmp/fabula-backend-headers \
            -w 'FABULA_BACKEND_HTTP=%{http_code}\n' \
            -H 'Content-Type: application/json' \
            --data '{"installation_id":"backend-diagnostic","name":"","messages":[{"role":"user","content":"Ответь одним словом: рядом."}]}' \
            http://127.0.0.1:8012/api/fabula/chat \
            || true
          sed -n '1,20p' /tmp/fabula-backend-headers
          sed -n '1,20p' /tmp/fabula-backend-body

          echo "FABULA_NGINX_ROUTE_DIAGNOSTIC"
          nginx -T 2>&1 \
            | grep -nE 'configuration file|server_name.*router1\.tech|FABULA_CHAT|location = /api/fabula/chat' \
            || true
          curl -sS --max-time 15 \
            -o /tmp/fabula-route-body \
            -D /tmp/fabula-route-headers \
            -w 'FABULA_ROUTE_HTTP=%{http_code}\n' \
            -H 'Content-Type: application/json' \
            --data '{"installation_id":"route-diagnostic","name":"","messages":[{"role":"user","content":"Ответь одним словом: рядом."}]}' \
            https://router1.tech/api/fabula/chat \
            || true
          sed -n '1,20p' /tmp/fabula-route-headers
          sed -n '1,20p' /tmp/fabula-route-body

          test -n "$FABULA_CLIENT_API_TOKEN"
          curl -fsS --max-time 55 \
            -H "Authorization: Bearer $FABULA_CLIENT_API_TOKEN" \
            -H 'Content-Type: application/json' \
            --data '{"installation_id":"deploy-check-001","name":"Анна","messages":[{"role":"user","content":"Мне тревожно. Просто выслушай меня."}]}' \
            https://router1.tech/api/fabula/chat \
            | python3 -c 'import json,sys; data=json.load(sys.stdin); assert data["reply"].strip(); print("CHAT_OK")'

          curl -fsS --max-time 55 \
            -H 'Content-Type: application/json' \
            --data '{"installation_id":"deploy-anonymous-001","name":"","messages":[{"role":"user","content":"Ответь одним словом: рядом."}]}' \
            https://router1.tech/api/fabula/chat \
            | python3 -c 'import json,sys; data=json.load(sys.stdin); assert data["reply"].strip(); print("ANONYMOUS_CHAT_OK")'

          trap - ERR
          echo "DEPLOY_OK backup=$BACKUP_DIR"
          REMOTE

      - name: Verify from outside the production server
        shell: bash
        run: |
          set -euo pipefail
          response=$(curl -fsS --max-time 55 \
            --resolve router1.tech:443:201.51.4.89 \
            -H 'Content-Type: application/json' \
            --data '{"installation_id":"github-external-check","name":"","messages":[{"role":"user","content":"Ответь одним словом: рядом."}]}' \
            https://router1.tech/api/fabula/chat)
          jq -e '.reply | strings | length > 0' <<<"$response" >/dev/null
